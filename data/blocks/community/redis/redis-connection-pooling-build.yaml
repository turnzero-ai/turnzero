constraints:
- Use a connection pool — never create a new Redis connection per request
- Set maxRetriesPerRequest and connectTimeout to avoid hanging on Redis downtime
- Use a single shared client instance; lazy-initialize it on first use, not at module
  load time
anti_patterns:
- Do not create a new Redis connection per request or per lambda invocation
- Do not block on Redis operations in the main event loop — use async clients
- Do not set pool size higher than your Redis server's maxclients limit
