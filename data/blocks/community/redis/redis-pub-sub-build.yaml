conflicts_with: []
requires: []
constraints:
- Use dedicated Redis connections for pub/sub — a subscribed connection cannot execute
  other commands
- Implement reconnection logic with exponential backoff for subscriber connections
- For reliable messaging (guaranteed delivery), use Redis Streams not pub/sub — pub/sub
  is fire-and-forget
anti_patterns:
- Do not reuse the same Redis connection for pub/sub and regular commands
- Do not rely on pub/sub for critical messages — missed if subscriber is disconnected
- Do not subscribe to patterns (psubscribe) with broad wildcards in high-throughput
  systems
