context_weight: 950
provides:
- payment-marketplace
conflicts_with_tags: []
conflicts_with: []
requires:
- stripe-checkout-build
constraints:
- Use Stripe Connect for multi-party payments (marketplaces, platforms)
- 'Decide on an account type: Standard (seller-owned), Express (platform-managed UX),
  or Custom (full white-label)'
- Implement 'Direct Charges' for simple marketplace flows where the seller is the
  merchant of record
- Use 'Destination Charges' if the platform needs to handle the checkout but the funds
  flow to the seller
- Handle onboarding via the Stripe-hosted onboarding flow to simplify identity verification
  (KYC)
anti_patterns:
- Do not attempt to collect sensitive seller information yourself — let Stripe handle
  KYC/AML compliance
- Do not ignore the 'account.updated' webhook — it's critical for knowing when a seller
  is ready to receive payments
- Do not manually calculate application fees if you can use Stripe's automatic fee
  collection
