constraints:
- Use namespaced Roles over ClusterRoles unless the workload genuinely needs cluster-wide
  access
- Bind service accounts to the minimum required permissions — audit with kubectl auth
  can-i
- Disable automountServiceAccountToken on pods that don't need API access
- Separate service accounts per workload — never share the default service account
anti_patterns:
- Do not grant cluster-admin to service accounts — it bypasses all RBAC
- Do not use wildcards (*) in verbs or resources in production RBAC rules
- Do not forget that RBAC is allow-only — absence of a rule denies, not allows
