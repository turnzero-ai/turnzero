constraints:
- 'Liveness probe: checks if container needs restart (deadlock, infinite loop) — should
  be lightweight'
- 'Readiness probe: checks if container should receive traffic — check DB/cache connectivity
  here'
- 'Startup probe: for slow-starting containers — disables liveness during startup
  to prevent premature restarts'
- Set initialDelaySeconds generously for readiness — prevents traffic during app boot
anti_patterns:
- Do not use the same endpoint for liveness and readiness — they have different purposes
- Do not make liveness probe check external dependencies — flaky dependency causes
  restart loop
- Do not set failureThreshold too low — transient errors will cause unnecessary restarts
