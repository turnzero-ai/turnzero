slug: docker-orchestration-migrate
version: 1.0.0
domain: docker
intent: migrate
last_verified: '2026-04-11'
tags:
- docker
- kubernetes
- orchestration
- migration
- devops
context_weight: 850
provides:
- docker-orchestration
conflicts_with_tags: []
conflicts_with: []
requires:
- docker-compose-production-build
constraints:
- Convert docker-compose.yml services to Kubernetes Deployments, Services, and Ingress
  resources
- Use ConfigMaps and Secrets for environment variables instead of local .env files
- Replace Docker Compose volumes with PersistentVolumeClaims (PVCs) and appropriate
  StorageClasses
- Implement readiness and liveness probes to allow the orchestrator to manage container
  health effectively
- Use a container registry (e.g., ECR, GCR, Docker Hub) to store and distribute images
  to the cluster
anti_patterns:
- Do not use 'latest' tags for images in an orchestrated environment — always use
  specific version tags or digests
- Do not attempt to manage stateful sets (databases) the same way as stateless deployments
- Do not forget to define resource requests and limits for every pod to prevent cluster
  instability
