constraints:
- Use includes() or eager_load() to eager-load associations accessed in loops
- Use bullet gem in development to detect N+1 queries automatically
- Use select() to load only needed columns when fetching large collections
anti_patterns:
- Do not call association methods inside a loop without eager loading
- Do not use joins() when you need to access association data — use includes() or
  eager_load()
- Do not ignore Bullet warnings — each one is a real N+1 in production
