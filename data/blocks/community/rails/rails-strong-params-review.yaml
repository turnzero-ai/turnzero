constraints:
- Always use strong parameters (params.require().permit()) in controller actions that
  write to the database
- Permit only the specific attributes needed for each action — different permit lists
  for create vs update
- Never permit :admin, :role, or :id through strong params in user-facing forms
anti_patterns:
- Do not use params.permit! — it allows all attributes and is equivalent to no protection
- Do not pass raw params hash to ActiveRecord methods
- Do not share the same permit list for create and update when they should differ
