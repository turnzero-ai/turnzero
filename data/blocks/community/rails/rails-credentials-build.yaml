constraints:
- Use rails credentials:edit to store secrets — encrypted with master.key, safe to
  commit credentials.yml.enc
- Never commit config/master.key or config/credentials/production.key — add to .gitignore
- Access credentials via Rails.application.credentials.dig(:service, :api_key) in
  code
- Use per-environment credentials files (config/credentials/production.yml.enc) for
  production secrets
anti_patterns:
- Do not store secrets in environment-specific YAML files committed to git
- Do not hardcode API keys in initializers
- Do not share master.key via git — distribute out-of-band (CI secrets, 1Password)
doc_anchors:
- url: https://guides.rubyonrails.org/security.html#custom-credentials
