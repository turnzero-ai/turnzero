provides: []
conflicts_with_tags: []
conflicts_with: []
requires:
- fastapi-async-build
constraints:
- Use ujson or orjson for faster JSON serialization/deserialization by configuring
  the response_class
- Avoid performing heavy CPU-bound tasks in the main event loop — offload to a thread
  pool or task queue (Celery/RQ)
- Implement connection pooling for database and external service clients
- Use Response models with 'exclude_unset' or 'exclude_defaults' to reduce payload
  size
- Configure Gunicorn/Uvicorn with the appropriate number of workers (typically 2 *
  cores + 1)
anti_patterns:
- Do not call blocking sync code inside 'async def' functions — use 'def' or run_in_executor
- Do not perform redundant database queries — use select_inload or joinedload for
  relationships
- Do not keep the application in debug/reload mode in production
