constraints:
- Use actions/cache for dependency caches (npm, pip, maven) — key on lockfile hash
- Use matrix strategy for cross-platform or multi-version testing
- Use concurrency groups to cancel in-progress runs on new push to same branch
- Use job outputs to pass data between jobs instead of writing to files
anti_patterns:
- Do not use actions/cache without a restore-keys fallback — cold cache stalls builds
- Do not run all tests in one massive job — parallelize with matrix or split jobs
- Do not hardcode runner OS — use ubuntu-latest but pin for reproducibility in release
