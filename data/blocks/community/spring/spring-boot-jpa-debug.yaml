constraints:
- Enable spring.jpa.show-sql=true and spring.jpa.properties.hibernate.format_sql=true
  to see queries in dev
- Use @Transactional at service layer — required for lazy loading to work outside
  the initial query
- Use JOIN FETCH in JPQL or EntityGraph to avoid N+1 on lazy collections
- Use Hibernate Statistics or p6spy to count queries per request and detect N+1
anti_patterns:
- Do not use FetchType.EAGER globally — it forces joins on every query even when not
  needed
- Do not access lazy collections outside a transaction — LazyInitializationException
- Do not use @Transactional on repository methods you're calling inside another @Transactional
  — check propagation
