constraints:
- Use tsvector + GIN index for full-text search — orders of magnitude faster than
  LIKE '%query%'
- 'Create a generated column: ALTER TABLE t ADD COLUMN fts tsvector GENERATED ALWAYS
  AS (to_tsvector(''english'', body)) STORED'
- Use plainto_tsquery for user input (safe); to_tsquery for structured queries
- Use ts_rank or ts_rank_cd to order results by relevance
anti_patterns:
- Do not use LIKE '%keyword%' on large tables — forces full table scan
- Do not use ILIKE for case-insensitive search at scale — use full-text search with
  proper config
- Do not forget to create the GIN index — tsvector without GIN is slower than LIKE
