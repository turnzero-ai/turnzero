constraints:
- Use react-native-reanimated for complex animations to ensure they run on the UI
  thread at 60fps
- Prefer declarative animations over imperative ones for better performance and predictability
- 'Review the use of useSharedValue and useAnimatedStyle: they are the core primitives
  for Reanimated v2+'
- Use Layout Transitions (Layout.springify()) for smooth entry/exit and layout change
  animations
- Ensure that heavy JS calculations are not performed inside animation frame callbacks
anti_patterns:
- Do not use the standard Animated API for high-performance gestures or complex transitions
- Do not trigger React state updates (setState) inside an animation loop if a shared
  value can be used instead
- Do not forget to use the 'worklet' directive for functions that must run on the
  UI thread
