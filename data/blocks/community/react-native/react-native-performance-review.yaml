constraints:
- Use FlashList from @shopify/flash-list instead of FlatList for significantly better
  list performance
- Memoize expensive computations with useMemo and callbacks with useCallback, especially
  when passed to sub-components
- Avoid anonymous functions in renderItem of lists — they trigger re-renders on every
  pass
- Use the Hermes engine for faster app start-up and reduced memory usage
- Profile the app using the React Native Debugger or Flipper to identify JS thread
  bottlenecks
anti_patterns:
- Do not perform heavy logic or data transformation on the JS thread during animations
- Do not use large, unoptimized images — use react-native-fast-image for better caching
  and performance
- Do not nest ScrollViews in the same direction — it breaks scroll physics and performance
