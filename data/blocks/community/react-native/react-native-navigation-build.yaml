- expo-router
- build
- mobile
context_weight: 800
provides:
- mobile-navigation
conflicts_with_tags:
- mobile-navigation
conflicts_with: []
requires:
- react-native-expo-build
constraints:
- Use Expo Router for file-based routing — it's the standard for modern Expo apps
- Organize screens in the app/ directory; use (groups) to separate auth, main, and
  modal flows
- Use the <Link> component or router.push() for navigation instead of Constructing
  manual state
- Implement shared element transitions using the _layout.tsx files and Slot or Stack
  components
- Handle deep linking and universal links using the built-in Expo Router configuration
anti_patterns:
- Do not use React Navigation directly unless you have a highly custom use case that
  Expo Router doesn't support
- Do not use 'any' for route parameters — define a strict TypeScript interface for
  your routes
- Do not perform side effects (like data fetching) directly in the navigation transition
doc_anchors:
