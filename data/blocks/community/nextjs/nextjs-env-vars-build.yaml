conflicts_with: []
requires: []
constraints:
- Variables prefixed NEXT_PUBLIC_ are bundled into client JS — visible to all users
- Server-only secrets (DB URLs, API keys) must NOT have NEXT_PUBLIC_ prefix — they
  stay server-side
- Use .env.local for local overrides — never commit it; .env is committed for non-secret
  defaults
- Access env vars via process.env.VAR_NAME — Next.js inlines them at build time for
  client
anti_patterns:
- Do not prefix secret keys with NEXT_PUBLIC_ — they will be exposed in browser source
- Do not access server-only env vars in Client Components — they will be undefined
  or cause build errors
- Do not use dynamic process.env[varName] — Next.js requires static string access
  for inlining
