constraints:
- Version APIs in the URL path (/v1/) or Accept header — choose one and be consistent
- Adding optional fields, new endpoints, and new enum values are non-breaking changes
- Removing fields, changing field types, changing semantics of existing fields are
  breaking changes
- Maintain at least the previous major version for 6-12 months after deprecating it
anti_patterns:
- Do not version query parameters (?version=1) — hard to route and cache
- Do not make breaking changes without a new major version number
- Do not deprecate without a sunset date in the Deprecation and Sunset HTTP headers
