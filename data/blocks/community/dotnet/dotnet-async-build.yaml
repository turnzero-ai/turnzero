constraints:
- Mark all async methods async Task or async Task<T> — avoid async void except for
  event handlers
- Use await throughout the call chain — mixing .Result or .Wait() with async causes
  deadlocks in ASP.NET
- Use ConfigureAwait(false) in library code to avoid capturing the synchronization
  context
- Use CancellationToken parameters in all async methods that do I/O
anti_patterns:
- Do not call .Result or .Wait() on a Task in ASP.NET context — causes deadlock
- Do not use async void except for event handlers — exceptions are unobservable
- Do not mix sync and async code in the same call chain
