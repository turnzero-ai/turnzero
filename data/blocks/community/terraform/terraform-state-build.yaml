constraints:
- Use remote state backend (S3 + DynamoDB, GCS, Terraform Cloud) — never commit terraform.tfstate
  to git
- Enable state locking — DynamoDB table for S3 backend prevents concurrent apply corruption
- Use separate state files per environment (dev/staging/prod) — one corrupted state
  should not affect others
- Use terraform state mv carefully — always backup state before manual state manipulation
anti_patterns:
- Do not commit .tfstate or .tfstate.backup files — they contain secrets in plaintext
- Do not share one state file across all environments
- Do not run terraform apply concurrently without state locking
