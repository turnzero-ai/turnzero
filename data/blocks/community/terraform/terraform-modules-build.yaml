constraints:
- Pin module versions with version = '~> x.y' — unpinned modules break on upstream
  changes
- Use terraform.tfvars for variable values; never hardcode in module calls
- 'Structure: root module calls child modules; child modules are reusable and version-pinned'
- Output only what callers need — avoid exposing internal resource attributes as outputs
anti_patterns:
- Do not use latest or no version constraint on remote modules
- Do not duplicate infrastructure code — extract into a module after the second copy
- Do not put provider configuration inside reusable modules — pass via required_providers
