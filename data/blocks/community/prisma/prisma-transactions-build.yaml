constraints:
- Use prisma.$transaction([...]) for sequential operations that must be atomic
- Use interactive transactions (prisma.$transaction(async (tx) => {...})) when you
  need query results to inform later queries in the same transaction
- Set maxWait and timeout options on transactions that touch contended tables
anti_patterns:
- Do not run multiple dependent writes outside a transaction — partial failure leaves
  data inconsistent
- Do not use interactive transactions for read-heavy operations — they hold locks
  longer
- Do not throw inside a transaction without handling rollback — Prisma auto-rolls
  back on throw but ensure errors surface
