constraints:
- Embed documents when data is accessed together and the embedded array is bounded
  in size
- Use references (ObjectId) when embedded documents would grow unboundedly or need
  independent access
- Avoid deeply nested documents — MongoDB has 100-level nesting limit and deep nesting
  kills readability
- Design schema for query patterns first — MongoDB schema design is query-driven not
  normalization-driven
anti_patterns:
- Do not embed arrays that grow without bound — document size limit is 16MB
- Do not use MongoDB like a relational DB with many joins ($lookup) — denormalize
  for read performance
- Do not use sequential integer IDs — use ObjectId unless you need custom IDs
