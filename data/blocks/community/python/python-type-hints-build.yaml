constraints:
- Use X | Y union syntax (Python 3.10+) over Union[X, Y]; use X | None over Optional[X]
- Add from __future__ import annotations at top of file to enable postponed evaluation
  of annotations
- Use TypedDict for dict shapes; dataclasses or Pydantic for structured data
- Run mypy --strict in CI — catches bugs before runtime
anti_patterns:
- Do not use Any without a comment explaining why narrowing is impossible
- 'Do not ignore mypy errors with # type: ignore without a reason on the same line'
- Do not mix old-style (List[str]) and new-style (list[str]) type hints in the same
  file
