constraints:
- Store JWTs in httpOnly, Secure, SameSite=Strict cookies — never in localStorage
  or sessionStorage
- Set short expiry on access tokens (15 min); use refresh tokens with rotation for
  long-lived sessions
- Always verify signature AND expiry AND issuer (iss) AND audience (aud) claims on
  every request
- Use RS256 (asymmetric) for JWTs shared across services; HS256 only when both sides
  share the secret safely
anti_patterns:
- Do not store JWTs in localStorage — XSS attack reads them trivially
- Do not trust JWT claims before verifying signature — decode ≠ verify
- Do not use alg:none — always enforce algorithm in verification
- Do not set expiry longer than session timeout; long-lived access tokens are a breach
  amplifier
