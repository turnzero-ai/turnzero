constraints:
- 'Use LCEL (pipe operator |) to compose chains: prompt | model | parser'
- Use RunnableParallel to run multiple chain branches simultaneously
- Use .stream() for streaming responses to users — do not buffer large LLM responses
- Use RunnableLambda to wrap plain Python functions into the chain
anti_patterns:
- Do not use legacy LLMChain or SequentialChain — use LCEL equivalents
- Do not block on .invoke() when streaming is available — degrades user experience
- Do not put retrieval logic directly in chains — use dedicated retriever runnables
