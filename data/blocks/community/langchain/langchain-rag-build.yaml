constraints:
- Chunk documents at semantic boundaries (paragraphs, sections) not fixed character
  counts
- Use a chunk overlap of 10-20% to preserve context across chunk boundaries
- Always store metadata (source, page, date) with chunks — needed for citation and
  filtering
- Re-rank retrieved documents with a cross-encoder before passing to LLM — improves
  answer quality
anti_patterns:
- Do not use a single large document as context — chunk and retrieve relevant sections
- Do not embed and retrieve without filtering by metadata when documents span different
  domains
- Do not skip evaluation — measure retrieval precision@k before shipping
