constraints:
- Check object-level authorization on every resource fetch — verify the requesting
  user owns or has access to the resource
- Use indirect references (UUIDs, opaque tokens) rather than sequential IDs in URLs
  where possible
- Apply authorization checks in the service layer, not just the route handler — prevents
  bypass via internal calls
anti_patterns:
- Do not assume that knowing an ID is sufficient authorization
- Do not rely on obscurity (non-sequential IDs) as the only access control
- Do not skip auth checks on 'internal' endpoints — they are often exposed via SSRF
  or misconfiguration
