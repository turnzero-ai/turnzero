constraints:
- Rate-limit authentication endpoints (login, password reset, OTP) by IP and by account
- Use exponential backoff + lockout after N failed attempts; alert on anomalous failure
  spikes
- Implement rate limiting at the edge (CDN/load balancer) not only in application
  code — app-level alone is bypassable
anti_patterns:
- Do not return different error messages for 'user not found' vs 'wrong password'
  — enables user enumeration
- Do not rate-limit only by IP — attackers distribute across IPs; also limit by account/email
- Do not skip rate limiting on API key endpoints — credential stuffing hits APIs too
