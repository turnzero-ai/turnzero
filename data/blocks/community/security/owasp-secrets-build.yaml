constraints:
- Never hardcode secrets, API keys, or credentials in source code — use environment
  variables or a secrets manager
- Use .env files locally; inject secrets via CI/CD environment or secrets manager
  (AWS Secrets Manager, Vault, Doppler) in production
- Rotate secrets immediately if they appear in git history — treat any committed secret
  as compromised
- Use git-secrets or truffleHog in CI to catch accidental commits
anti_patterns:
- Do not commit .env files — add to .gitignore before first commit
- Do not log secrets or include them in error messages
- Do not pass secrets as CLI arguments — they appear in process list and shell history
- Do not use the same secret across environments
