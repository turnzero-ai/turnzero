constraints:
- Always use parameterized queries or prepared statements — never string-concatenate
  user input into SQL
- Use an ORM query builder for dynamic queries; drop to raw SQL only when necessary
  with named params
- Validate and whitelist column/table names if they must be dynamic — parameterization
  does not cover identifiers
anti_patterns:
- Do not use string formatting or f-strings to build SQL queries
- Do not rely on input escaping as the primary SQLi defense — parameterization is
  the fix
- Do not give DB user more privileges than needed — limit blast radius
