requires: []
constraints:
- 'Set security headers on every response: Content-Security-Policy, X-Frame-Options,
  X-Content-Type-Options, Strict-Transport-Security'
- Validate and sanitise all user input server-side — client-side validation is UX,
  not security
- Use parameterised queries / prepared statements for all database access — never
  interpolate user input into SQL
- Implement CSRF protection for any state-changing request (SameSite cookie attribute
  + CSRF token)
- Enforce HTTPS everywhere; redirect HTTP → HTTPS at the load balancer or application
  layer
- Rate-limit authentication endpoints to mitigate credential stuffing and brute force
anti_patterns:
- Do not trust the Origin or Referer header alone for CSRF protection — they can be
  spoofed
- Do not use innerHTML or dangerouslySetInnerHTML with unsanitised user content —
  classic XSS vector
- Do not expose stack traces or internal error details to the client in production
- Do not rely on security through obscurity (hidden endpoints, non-standard ports)
  as a primary control
- 'Do not disable CORS restrictions globally (Access-Control-Allow-Origin: *) for
  authenticated endpoints'
