constraints:
- Use SameSite=Strict or SameSite=Lax on session cookies to block CSRF for most cases
- For APIs used by third-party frontends, use CSRF tokens (synchronizer token pattern)
  or verify Origin/Referer header
- 'Double-submit cookie pattern: send CSRF token in both cookie and request header,
  verify they match server-side'
anti_patterns:
- Do not rely on secret URLs or POST-only endpoints as CSRF protection
- Do not skip CSRF protection for state-changing endpoints just because they use JSON
- Do not set SameSite=None without also setting Secure
