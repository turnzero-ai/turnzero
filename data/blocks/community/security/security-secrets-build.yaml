- vault
- dotenv
- credentials
context_weight: 900
provides:
- secrets-management
conflicts_with: []
conflicts_with_tags: []
requires: []
constraints:
- Never hardcode secrets (API keys, tokens, passwords) in source code — use environment
  variables or a secrets manager (Vault, AWS Secrets Manager, Doppler)
- Load secrets at runtime, not build time — secrets must not be baked into container
  images or build artefacts
- Use a .env file only in local development; ensure it is in .gitignore and never
  committed
- Rotate secrets programmatically — treat them as ephemeral; avoid long-lived static
  credentials
- Scope secrets to the minimum required permissions (least-privilege) — separate read/write
  credentials where possible
anti_patterns:
- Do not commit .env files or any file containing real credentials to version control,
  even in a private repo
- Do not pass secrets as CLI arguments or log them — they appear in process lists
  and log aggregators
- Do not use the same secret across environments (dev/staging/prod) — a staging breach
  should not compromise production
- Do not store secrets in JWT payloads or client-side storage (localStorage, cookies
  without HttpOnly)
