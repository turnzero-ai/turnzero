constraints:
- 'Wrap errors with context using fmt.Errorf(''doing X: %w'', err) — preserves the
  original for errors.Is/As'
- Use errors.Is() for sentinel error comparison; errors.As() to extract a typed error
  from the chain
- Define sentinel errors as var ErrNotFound = errors.New('not found') at package level
- Return errors to callers; only log at the top level where you handle them
anti_patterns:
- Do not use fmt.Errorf without %w when you need callers to unwrap the error
- Do not swallow errors with _ — at minimum log them
- Do not panic for recoverable errors — return error instead
