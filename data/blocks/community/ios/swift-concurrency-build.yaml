constraints:
- Mark UI-updating code with @MainActor — all UIKit/SwiftUI updates must happen on
  main thread
- Use async/await over completion handlers for all new async code in Swift 5.5+
- Use Task { } to call async code from sync context; use Task.detached only when you
  need no actor inheritance
- Use withTaskGroup for structured parallelism — prefer over DispatchGroup for async
  work
anti_patterns:
- Do not update UI from a background thread — use await MainActor.run { } or @MainActor
  annotation
- Do not use DispatchQueue.main.async in new Swift concurrency code — use @MainActor
- Do not ignore Task cancellation — check Task.isCancelled in long-running loops
