constraints:
- Use PKCE (Proof Key for Code Exchange) for all SPA and mobile OAuth flows — no client_secret
  in frontend
- Always validate the state parameter on callback to prevent CSRF attacks
- Store tokens in memory (JS variable) for SPAs, not localStorage; use httpOnly cookie
  for refresh token
- Use authorization code flow + PKCE, never implicit flow (deprecated in OAuth 2.1)
anti_patterns:
- Do not use implicit flow — it exposes tokens in URL fragments and is deprecated
- Do not store client_secret in frontend code or mobile app binaries
- Do not skip state parameter validation on the OAuth callback
- Do not request more scopes than the feature needs
