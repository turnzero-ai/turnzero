tags: [security, credentials, rotation, incident, breach, keys]
context_weight: 800
provides: [credential-rotation]
conflicts_with: []
conflicts_with_tags: []
requires: []

constraints:
  - "Treat any potentially-exposed credential as fully compromised — revoke first, investigate second"
  - "Rotate in this order: revoke old → issue new → deploy new → confirm old is inactive → audit logs for use of old"
  - "After rotation, scan git history (trufflehog, gitleaks) to confirm the leaked credential is not still committed anywhere"
  - "Notify affected services and downstream consumers before the old credential expires to avoid surprise outages"
  - "Document the incident timeline: when exposed, how discovered, what was accessed, remediation steps taken"

anti_patterns:
  - "Do not simply update the secret value in .env and redeploy — verify the old credential is actually revoked at the provider"
  - "Do not rotate only the directly-exposed secret — audit for related credentials that may have been accessible from the same compromise vector"
  - "Do not delay rotation while investigating — attacker dwell time increases with every hour the credential is live"
  - "Do not reuse the compromised credential value after rotation — generate a fresh high-entropy secret"

