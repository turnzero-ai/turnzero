requires: ["typescript-strict-build"]

constraints:
  - "Enable 'allowJs' and 'checkJs' in tsconfig.json to allow a gradual migration from JavaScript to TypeScript"
  - "Use 'JSDoc' type annotations in JS files to get type checking benefits before fully converting to .ts"
  - "Start by converting leaf modules (files with no dependencies) and work your way up the dependency tree"
  - "Use 'unknown' instead of 'any' during the initial migration to maintain a higher level of safety"
  - "Install type definitions (@types/...) for all third-party libraries used in the project"

anti_patterns:
  - "Do not try to convert the entire codebase at once — a phased approach is much safer and less disruptive"
  - "Do not use 'any' as a shortcut to suppress migration errors — fix the types or use @ts-ignore with a TODO"
  - "Do not forget to update your build pipeline and tests to support TypeScript files"

