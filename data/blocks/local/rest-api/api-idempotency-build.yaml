constraints:
- Accept an Idempotency-Key header on state-changing POST endpoints (payments, email
  sends)
- Store the idempotency key and response for 24-48h — return cached response on duplicate
- PUT and DELETE should be naturally idempotent — same request twice = same result
- Use UUID v4 for idempotency keys — clients generate them before sending
anti_patterns:
- Do not allow POSTs to charge a card or send an email twice on network retry without
  idempotency keys
- Do not use timestamp-based idempotency keys — clock skew causes false uniqueness
- Do not store idempotency keys in application memory — use Redis or DB for distributed
  systems
