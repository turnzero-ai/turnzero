constraints:
- Use ref() for primitives and reactive() for objects; always access ref values via
  .value in script
- Template refs auto-unwrap; script refs require .value — this is the most common
  confusion point
- Use computed() for derived state; it caches and only recomputes when dependencies
  change
- Use watchEffect() for side effects that depend on reactive state; use watch() when
  you need old/new values
anti_patterns:
- Do not destructure reactive() objects — you lose reactivity; use toRefs() if you
  need destructuring
- Do not mutate props directly — emit events to parent or use v-model
- Do not use reactive() on primitives — use ref() instead
