constraints:
- Use next/image for all images — automatic WebP/AVIF conversion, lazy loading, size
  optimization
- Always provide width and height props (or fill prop with a sized parent) to prevent
  layout shift
- Add external image domains/patterns to next.config.js images.remotePatterns
- Use priority prop on above-the-fold images (hero, LCP candidate) to preload them
anti_patterns:
- Do not use <img> tag for images that go through Next.js — loses all optimization
- Do not use fill without a positioned parent container with explicit dimensions
- Do not add * to remotePatterns without restricting hostname — security risk
