constraints:
- Pin actions to full commit SHA not tags — tags are mutable and can be hijacked
- 'Set minimum permissions: permissions: contents: read at workflow level, override
  per job'
- Use OIDC for cloud auth (aws-actions/configure-aws-credentials with role-to-assume)
  — no long-lived secrets
- Avoid using pull_request_target with code from forks — it has write permissions
  and is dangerous
anti_patterns:
- Do not use secrets in environment variables when OIDC can replace them
- Do not use actions/checkout@v3 style pinning — pin to SHA
- Do not echo secrets in run steps — they leak in logs even if GitHub masks them partially
