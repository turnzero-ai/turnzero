constraints:
- Use +page.server.js for data that must not expose API keys to client; use +page.js
  for public data
- load() functions receive { params, fetch, locals, parent } — use the provided fetch,
  not global fetch
- Return plain objects from load() — they are serialized; do not return class instances
- Use parent() in load() to access parent layout data; creates a waterfall — prefer
  parallel fetches
anti_patterns:
- Do not access server-only modules (db, secrets) in +page.js — it runs on client
  too
- Do not use global fetch in load() — use the provided fetch which handles cookies
  and relative URLs
- Do not return non-serializable values (functions, class instances) from load()
