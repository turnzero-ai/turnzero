constraints:
- Create indexes on all fields used in query filters and sort operations
- Compound indexes follow prefix rule — index on {a,b,c} covers queries on a, a+b,
  a+b+c but not b or c alone
- Use explain('executionStats') to verify queries use indexes (IXSCAN not COLLSCAN)
- Use sparse indexes for fields that are often absent — avoids indexing null entries
anti_patterns:
- Do not create an index on every field — write overhead and memory cost
- Do not query large collections without indexes in production — COLLSCAN kills performance
- Do not put high-cardinality fields last in compound indexes — put them first
