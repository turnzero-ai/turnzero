conflicts_with: []
requires: []
constraints:
- Mount secrets as volumes rather than environment variables — env vars can leak in
  logs and process listings
- Enable encryption at rest for etcd (EncryptionConfiguration) — Secrets are base64
  not encrypted by default
- Use External Secrets Operator or Vault Agent Injector to sync secrets from external
  secret managers
- Restrict Secret access with RBAC — only the service accounts that need them
anti_patterns:
- Do not store secrets in ConfigMaps — they are not encrypted
- Do not base64-encode and call it secure — base64 is encoding not encryption
- Do not mount secrets into all pods by default via default service account
