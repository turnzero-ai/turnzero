tags: [postgresql, sql, database, performance, security]
context_weight: 700
provides: []
conflicts_with_tags: []
conflicts_with: []
requires: []

constraints:
  - "Always use parameterized queries — never interpolate user input into SQL strings regardless of escaping"
  - "Use RETURNING clause to get inserted/updated rows back instead of a separate SELECT: INSERT INTO ... RETURNING id, created_at"
  - "Use JSONB not JSON for any column you will query into — JSON stores raw text, JSONB is parsed and supports indexing"
  - "Index every foreign key column — PostgreSQL does not create these automatically unlike some other databases"
  - "Use transactions for any multi-statement operation that must be atomic: wrap in BEGIN/COMMIT, use ROLLBACK on error"
  - "Use gen_random_uuid() for UUID primary keys (available without extension in PostgreSQL 13+) — do not generate UUIDs in application code"
  - "Prefer timestamptz (timestamp with time zone) over timestamp — store and return UTC, convert to local in application layer"

anti_patterns:
  - "Do not use SELECT * in production queries — it breaks when columns are added and transfers unnecessary data"
  - "Do not perform N+1 queries — use JOIN or WHERE id = ANY($1::uuid[]) with an array parameter to batch"
  - "Do not store comma-separated values in a text column — use an array column (text[]) or a junction table"
  - "Do not use SERIAL for primary keys in new schemas — use GENERATED ALWAYS AS IDENTITY which is SQL-standard"
  - "Do not run schema migrations in application startup code — use a dedicated migration tool (Flyway, Alembic, golang-migrate) with a migration lock"
  - "Do not use NOT IN with a subquery that can return NULLs — it returns no rows if any NULL is present; use NOT EXISTS instead"

