constraints:
  - "Use Stripe Billing for managing recurring payments and subscription lifecycles"
  - "Implement the Stripe Customer Portal to allow users to manage their own subscriptions and payment methods"
  - "Handle 'customer.subscription.deleted' webhooks to immediately revoke access when a subscription is cancelled or fails"
  - "Use the 'expand' parameter in API calls to retrieve related objects (like prices or products) in a single request"
  - "Always check the subscription status ('active', 'past_due', 'trialing') before granting access to features"

anti_patterns:
  - "Do not implement your own billing logic for handling trials, cancellations, or upgrades — use Stripe's built-in features"
  - "Do not store subscription price amounts in your database; always use the Stripe Price ID as the source of truth"
  - "Do not forget to handle prorations when users switch between different subscription tiers"

