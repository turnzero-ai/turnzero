constraints:
  - "Review recursive type definitions for deep nesting — use interfaces over types for better compiler performance"
  - "Avoid excessive use of conditional types in hot paths — they increase compilation time"
  - "Ensure that discriminated unions are used for complex state instead of multiple boolean flags"
  - "Check for unnecessary 'any' or 'unknown' casts that bypass type safety during review"
  - "Prefer const enums or union types for literal values to reduce runtime overhead"

anti_patterns:
  - "Do not use type assertions (as T) when a type guard (is T) would be more robust"
  - "Do not use the 'any' type to silence the compiler — fix the underlying type definition"
  - "Do not leave unused generic parameters in functions or classes"

